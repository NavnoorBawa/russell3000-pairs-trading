name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg            # headless matplotlib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pandas scipy scikit-learn statsmodels matplotlib seaborn tqdm yfinance requests pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Byte-compile all modules (syntax gate)
        run: python -m compileall -q pairs_trading

      - name: Run test suite
        run: pytest -q
