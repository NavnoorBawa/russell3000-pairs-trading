name: CodeQL

# Static security analysis (free for public repos). Scans the Python code for
# known vulnerability patterns on push, PR, and a weekly schedule.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"        # Mondays 06:00 UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
